<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Prompt Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#0e0e10; --s1:#17171a; --s2:#202024; --s3:#2a2a2f; --line:#2e2e34;
  --ink:#f0f0ec; --ink2:#909098; --ink3:#46464f;
  --c-sub:#f0f0ec; --c-art:#c084fc; --c-med:#e879f9; --c-cam:#38bdf8;
  --c-sht:#4ade80; --c-lit:#fbbf24; --c-col:#fb923c; --c-mod:#f472b6;
  --c-set:#818cf8; --c-chr:#34d399; --c-tex:#f87171; --c-ren:#94a3b8; --c-qua:#e2e8f0;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
html,body { height:100%; background:var(--bg); color:var(--ink); font-family:'Noto Sans KR',sans-serif; overflow:hidden; }

.app { display:flex; flex-direction:column; height:100dvh; height:100vh; padding-top:var(--safe-t); }

/* TITLEBAR */
.titlebar {
  flex-shrink:0; background:var(--s1); border-bottom:1px solid var(--line);
  padding:11px 16px 10px; display:flex; align-items:center; justify-content:space-between;
}
.app-title { font-family:'DM Mono',monospace; font-size:15px; font-weight:500; letter-spacing:2px; color:var(--ink); text-transform:uppercase; }
.app-sub { font-size:11px; color:var(--ink3); font-weight:300; }

/* ZONE TOP */
.zone-top {
  flex-shrink:0; background:var(--s1); border-bottom:1px solid var(--line);
  padding:10px 14px 12px; min-height:120px; max-height:175px;
  display:flex; flex-direction:column; gap:8px;
}
.zone-top-bar { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.zone-lbl { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--ink3); text-transform:uppercase; }
.top-actions { display:flex; gap:6px; align-items:center; }
.count-pill { font-family:'DM Mono',monospace; font-size:10px; color:var(--ink2); background:var(--s3); border-radius:20px; padding:3px 9px; }
.btn { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; background:none; border:1px solid var(--line); border-radius:6px; padding:4px 11px; cursor:pointer; color:var(--ink2); transition:all .15s; }
.btn:active { color:var(--ink); border-color:var(--ink2); }
.btn.ok { color:#4ade80; border-color:#4ade80; }
.btn-reset { color:var(--ink3); }

.prompt-display { flex:1; overflow-y:auto; font-family:'DM Mono',monospace; font-size:12px; line-height:2; word-break:break-word; }
.prompt-display::-webkit-scrollbar { width:2px; }
.prompt-display::-webkit-scrollbar-thumb { background:var(--line); }
.prompt-empty { color:var(--ink3); font-size:12px; font-family:'Noto Sans KR',sans-serif; font-weight:300; font-style:italic; }
.tok-sep { color:var(--ink3); }
.tok-sub { color:var(--c-sub); font-weight:700; }
.tok-art { color:var(--c-art); } .tok-med { color:var(--c-med); } .tok-cam { color:var(--c-cam); }
.tok-sht { color:var(--c-sht); } .tok-lit { color:var(--c-lit); } .tok-col { color:var(--c-col); }
.tok-mod { color:var(--c-mod); } .tok-set { color:var(--c-set); } .tok-chr { color:var(--c-chr); }
.tok-tex { color:var(--c-tex); } .tok-ren { color:var(--c-ren); } .tok-qua { color:var(--c-qua); }

/* ZONE MID */
.zone-mid { flex:1; overflow-y:auto; background:var(--bg); padding:16px 14px 16px; overscroll-behavior:contain; }
.zone-mid::-webkit-scrollbar { width:3px; }
.zone-mid::-webkit-scrollbar-thumb { background:var(--line); border-radius:3px; }

.mid-header { display:flex; align-items:center; gap:10px; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--line); }
.mid-icon { font-size:22px; }
.mid-en { font-family:'DM Mono',monospace; font-size:16px; font-weight:500; letter-spacing:1px; text-transform:uppercase; }
.mid-ko { font-size:14px; color:var(--ink2); font-weight:400; }

.sub-section { margin-bottom:22px; }
.sub-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--ink3); text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.sub-label::after { content:''; flex:1; height:1px; background:var(--line); }

/* CHIPS — bigger */
.chips { display:flex; flex-wrap:wrap; gap:9px; }
.chip {
  cursor:pointer; background:var(--s2); border:1.5px solid var(--line); border-radius:11px;
  padding:11px 15px 10px; display:flex; flex-direction:column; gap:4px;
  transition:border-color .12s, background .12s; user-select:none; -webkit-user-select:none;
  min-width:88px;
}
.chip:active { opacity:.75; }
.chip-en { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--ink); line-height:1.3; }
.chip-ko { font-size:12px; font-weight:400; color:var(--ink2); line-height:1.3; }
.chip.on .chip-en { font-weight:700; }
.chip.on .chip-ko { color:var(--ink2); }

/* SUBJECT */
.subject-zone { display:flex; flex-direction:column; gap:8px; }
.subject-zone textarea {
  width:100%; background:var(--s2); border:1.5px solid var(--line); border-radius:12px;
  padding:15px 16px; font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:400;
  color:var(--ink); outline:none; resize:none; line-height:1.7; caret-color:var(--ink); transition:border-color .2s;
}
.subject-zone textarea::placeholder { color:var(--ink3); }
.subject-zone textarea:focus { border-color:var(--ink2); }
.subject-hint { font-size:11px; color:var(--ink3); font-weight:300; padding-left:2px; }

/* ZONE BOT */
.zone-bot {
  flex-shrink:0; background:var(--s1); border-top:1px solid var(--line);
  padding-bottom: max(10px, var(--safe-b));
}
.nav-scroll {
  display:flex; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
  padding:10px 12px 0; gap:8px; scrollbar-width:none;
}
.nav-scroll::-webkit-scrollbar { display:none; }

.nav-tab {
  flex-shrink:0; cursor:pointer; border-radius:12px; padding:10px 14px 9px;
  background:var(--s2); border:1.5px solid var(--line); transition:all .15s;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  min-width:68px; position:relative;
}
.nav-tab.active { background:var(--s3); border-color:var(--cat-color, var(--ink2)); }
.nav-tab-icon { font-size:20px; line-height:1; }
.nav-tab-en { font-family:'DM Mono',monospace; font-size:9px; color:var(--ink2); letter-spacing:.5px; text-align:center; line-height:1.3; }
.nav-tab-ko { font-size:10px; font-weight:400; color:var(--ink3); text-align:center; line-height:1.3; }
.nav-tab.active .nav-tab-en { color:var(--ink); font-weight:500; }
.nav-tab.active .nav-tab-ko { color:var(--ink2); }
.nav-dot { position:absolute; top:7px; right:7px; width:7px; height:7px; border-radius:50%; background:#4ade80; opacity:0; transition:opacity .2s; }
.nav-tab.has-sel .nav-dot { opacity:1; }
</style>
</head>
<body>
<div class="app">
  <!-- TITLEBAR -->
  <div class="titlebar">
    <span class="app-title">Prompt Builder</span>
    <span class="app-sub">AI 이미지 프롬프트 빌더</span>
  </div>
  <!-- ZONE TOP -->
  <div class="zone-top">
    <div class="zone-top-bar">
      <span class="zone-lbl">Generated Prompt</span>
      <div class="top-actions">
        <span class="count-pill" id="countPill">0 선택</span>
        <button class="btn" id="copyBtn" onclick="doCopy()">Copy</button>
        <button class="btn btn-reset" onclick="doReset()">↺</button>
      </div>
    </div>
    <div class="prompt-display" id="promptDisplay">
      <span class="prompt-empty">아래 카테고리를 눌러 항목을 선택하세요.</span>
    </div>
  </div>
  <!-- ZONE MID -->
  <div class="zone-mid" id="zoneMid"></div>
  <!-- ZONE BOT -->
  <div class="zone-bot">
    <div class="nav-scroll" id="navScroll"></div>
  </div>
</div>

const sel = {};
const ORDER = ['subject','art','medium','camera','shot','lighting','color','mood','setting','character','texture','render','quality'];
let activeCatId = 'subject';

function buildNav() {
  const nav = document.getElementById('navScroll');
  CATS.forEach(cat => {
    const tab = document.createElement('div');
    tab.className = 'nav-tab';
    tab.id = 'tab-' + cat.id;
    tab.style.setProperty('--cat-color', cat.color);
    tab.innerHTML = '<span class="nav-tab-icon">' + cat.icon + '</span><span class="nav-tab-en">' + cat.en + '</span><span class="nav-tab-ko">' + cat.ko + '</span><span class="nav-dot"></span>';
    tab.onclick = () => switchCat(cat.id);
    nav.appendChild(tab);
  });
}

function switchCat(catId) {
  activeCatId = catId;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.getElementById('tab-' + catId);
  activeTab.classList.add('active');
  activeTab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});

  const cat = CATS.find(c => c.id === catId);
  const mid = document.getElementById('zoneMid');
  mid.innerHTML = '';
  mid.scrollTop = 0;

  const hdr = document.createElement('div');
  hdr.className = 'mid-header';
  hdr.innerHTML = '<span class="mid-icon">' + cat.icon + '</span><span class="mid-en" style="color:' + cat.color + '">' + cat.en + '</span><span class="mid-ko">' + cat.ko + '</span>';
  mid.appendChild(hdr);

  if (cat.isText) {
    const wrap = document.createElement('div');
    wrap.className = 'subject-zone';
    const ta = document.createElement('textarea');
    ta.rows = 5; ta.id = 'subject-ta'; ta.placeholder = cat.placeholder;
    ta.value = sel.subject || '';
    ta.oninput = () => { sel.subject = ta.value.trim(); renderPrompt(); };
    const hint = document.createElement('div');
    hint.className = 'subject-hint';
    hint.textContent = '이미지의 핵심 주제를 자유롭게 입력하세요. 영어 입력 시 더 정확합니다.';
    wrap.appendChild(ta); wrap.appendChild(hint); mid.appendChild(wrap);
  } else {
    cat.subs.forEach(sub => {
      const ss = document.createElement('div'); ss.className = 'sub-section';
      const lbl = document.createElement('div'); lbl.className = 'sub-label'; lbl.textContent = sub.label;
      ss.appendChild(lbl);
      const chips = document.createElement('div'); chips.className = 'chips';
      sub.opts.forEach(o => {
        const c = document.createElement('div');
        const isOn = sel[catId] === o.en;
        c.className = 'chip' + (isOn ? ' on' : '');
        if (isOn) { c.style.borderColor = cat.color; c.style.background = 'var(--s3)'; }
        c.innerHTML = '<span class="chip-en" style="' + (isOn ? 'color:'+cat.color : '') + '">' + o.en + '</span><span class="chip-ko">' + o.ko + '</span>';
        c.onclick = () => toggleChip(catId, o.en, c, cat.color);
        chips.appendChild(c);
      });
      ss.appendChild(chips); mid.appendChild(ss);
    });
  }
}

function toggleChip(catId, val, chip, color) {
  const was = chip.classList.contains('on');
  document.querySelectorAll('#zoneMid .chip').forEach(c => {
    c.classList.remove('on'); c.style.borderColor = ''; c.style.background = '';
    const en = c.querySelector('.chip-en'); if (en) en.style.color = '';
  });
  if (was) { delete sel[catId]; }
  else {
    sel[catId] = val; chip.classList.add('on');
    chip.style.borderColor = color; chip.style.background = 'var(--s3)';
    const en = chip.querySelector('.chip-en'); if (en) en.style.color = color;
  }
  const tab = document.getElementById('tab-' + catId);
  if (sel[catId]) tab.classList.add('has-sel'); else tab.classList.remove('has-sel');
  renderPrompt();
}

function renderPrompt() {
  const parts = ORDER.filter(k => sel[k]);
  document.getElementById('countPill').textContent = parts.length + ' 선택';
  const display = document.getElementById('promptDisplay');
  if (!parts.length) { display.innerHTML = '<span class="prompt-empty">아래 카테고리를 눌러 항목을 선택하세요.</span>'; return; }
  const clsMap = {}; CATS.forEach(c => { clsMap[c.id] = c.tokCls; });
  display.innerHTML = parts.map((k,i) => '<span class="tok ' + clsMap[k] + '">' + sel[k] + '</span>' + (i < parts.length-1 ? '<span class="tok-sep">, </span>' : '')).join('');
  display.scrollTop = display.scrollHeight;
}

function doCopy() {
  const t = ORDER.filter(k => sel[k]).map(k => sel[k]).join(', ');
  if (!t) return;
  navigator.clipboard.writeText(t).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1400);
  });
}

function doReset() {
  ORDER.forEach(k => delete sel[k]);
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('has-sel'));
  renderPrompt(); switchCat(activeCatId);
}

buildNav();
switchCat('subject');
document.getElementById('tab-subject').classList.add('active');
</script>
